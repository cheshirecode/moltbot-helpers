apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-services
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: openclaw-services
  labels:
    app: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: "financial_analysis"
        - name: POSTGRES_USER
          value: "finance_user"
        - name: POSTGRES_PASSWORD
          value: "secure_finance_password"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - finance_user
            - -d
            - financial_analysis
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - finance_user
            - -d
            - financial_analysis
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: openclaw-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: openclaw-services
spec:
  selector:
    app: postgres-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw-services
data:
  # Configuration for services that need to connect to WSL-based OpenClaw
  WSL_OPENCLAW_HOST: "host.docker.internal"  # For Docker Desktop
  WSL_OPENCLAW_HOST_FALLBACK: "172.17.0.1"   # For Linux Docker